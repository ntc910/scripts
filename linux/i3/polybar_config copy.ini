[colors]
background = #1F1F1F
background-alt = #373B41
foreground = #C5C8C6
primary = #10b1fe
secondary = #28e4eb
alert = #A54242
disabled = #707880

background-transparent = #00000000
background-island = #1e1e2e


[bar/example]
width = 50%
height = 24pt
radius = 10
; offset-x = 1%
; offset-y = 1%

; dpi = 96

background = ${colors.background}
1reground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

; font-0 = monospace;2
font-0 = "Google Sans Mono:size=12;2"
font-1 = "Symbols Nerd Font:size=12;2"

modules-left = xworkspaces xwindow
modules-center = clock date
modules-right = network cpu memory filesystem

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
;------------------------------------------------------------------------------
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt
;------------------------------------------------------------------------------
[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1
;------------------------------------------------------------------------------
[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
;------------------------------------------------------------------------------
[module/filesystem]
type = internal/fs
interval = 60

mount-0 = /

format-mounted-prefix = "Ôā† "
format-mounted-prefix-foreground = ${colors.primary}

label-mounted = %used%
;------------------------------------------------------------------------------
[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.primary}
label = %used%
;------------------------------------------------------------------------------
[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%
;------------------------------------------------------------------------------
[module/clock]
type = internal/date
interval = 1

format-prefix = "Ôźļ " 
format-prefix-foreground = ${colors.primary}

date = %I:%M %p
date-alt = %Y-%m-%d %I:%M:%S %p

label = %date%
;------------------------------------------------------------------------------
[module/date]
type = internal/date
interval = 1

format-prefix = "ÔĄ≥ " 
format-prefix-foreground = ${colors.primary}

date = %d/%m/%Y
date-alt = %Y-%m-%d %I:%M:%S %p

label = %date%
; label-foreground = ${colors.primary}
;------------------------------------------------------------------------------
[module/network]
type = internal/network
interface = eth0
interval = 1.0

; ńźŠĽčnh dŠļ°ng khi kŠļŅt nŠĽĎi
label-connected = %{F#10b1fe}%{T2}ÔÄö%{T-} %{F-}%downspeed:9% %{F#10b1fe}%{T2}ÔÄõ%{T-} %{F-}%upspeed:9%
; label-connected-foreground = ${colors.primary}

; ńźŠĽčnh dŠļ°ng khi mŠļ•t mŠļ°ng
label-disconnected = %{T2}ůįÖõ%{T-} Disconnected
label-disconnected-foreground = ${colors.disabled}
;------------------------------------------------------------------------------
